name: Restock Monitor

on:
  schedule:
    # Toutes les 5 minutes (minimum autorise par GitHub Actions).
    # Chaque run boucle ensuite ~4 min en interne (poll toutes les 60s),
    # ce qui donne une cadence proche de 60s sans chevauchement.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # permet de lancer manuellement depuis l'onglet Actions

# Empeche deux runs de tourner en meme temps (evite doublons d'alertes).
concurrency:
  group: restock-monitor
  cancel-in-progress: false

permissions:
  contents: write   # necessaire pour committer state.json

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          POLL_INTERVAL: "60"
          LOOP_DURATION: "280"
        run: python monitor.py

      - name: Persist state
        if: always()
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state [skip ci]"
            git push
          else
            echo "Aucun changement d'etat a committer."
          fi
